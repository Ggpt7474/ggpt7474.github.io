name: Publish to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Apply
        env:
          AC33AC: ${{ secrets.AC33AC }}
          B5B847: ${{ secrets.B5B847 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('AC33AC', '')
          bm = os.environ.get('B5B847', '')
          p = pathlib.Path('index.html')
          s = s2 = p.read_text(encoding='utf-8')
          if gm:
              s2 = s2.replace('<!-- 4a128ceda3d3c049 -->', gm)
          if bm:
              s2 = s2.replace('<!--  -->', bm)
          if s2 == s and (gm or bm):
              sys.exit(1)
          if s2 != s:
              p.write_text(s2, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
